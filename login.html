<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login • Negozi De Fummo</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="age-gate" id="ageGate" aria-hidden="true">
    <div class="age-gate__card" role="dialog" aria-modal="true" aria-labelledby="ageGateTitle">
      <h1 id="ageGateTitle">Age Verification</h1>
      <p>Are you 18 years old or older?</p>
      <div class="age-gate__actions">
        <button class="btn btn--primary" id="ageYes">YES (I AM 18+)</button>
        <button class="btn btn--secondary" id="ageNo">NO (UNDER 18)</button>
      </div>
      <p class="age-gate__footnote">By entering this site, you confirm that you are of legal age.</p>
    </div>
  </div>

  <header class="site-header">
    <div class="container header__inner">
      <a class="brand" href="index.html">
        <span class="brand__logo">N</span>
        <span class="brand__name">NEGOZIO<br/><span class="brand__sub">DE FUMMO</span></span>
      </a>
      <nav class="nav">
        <a class="nav__item" href="index.html#shop">SHOP</a>
        <a class="nav__icon" href="login.html" aria-label="Account">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" fill="currentColor"/>
          </svg>
        </a>
        <a class="nav__icon" href="index.html#cart" aria-label="Cart">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zm10 0c-1.1 0-1.99.9-1.99 2S15.9 22 17 22s2-.9 2-2-.9-2-2-2zM7.16 14l.84-2h7.74l.86 2H7.16zM5.21 4l1.04 4h12.24l1.7 4H7.8l-1.8-7H1V4h4.21z" fill="currentColor"/>
          </svg>
        </a>
      </nav>
    </div>
  </header>

  <main class="auth">
    <div class="auth__card">
      <h1>Login</h1>
      <p class="auth__subtitle">Welcome back to FUMMO</p>

      <form id="loginForm">
        <label class="auth__label">
          <span>EMAIL</span>
          <input name="email" type="email" required placeholder="your@email.com" />
        </label>

        <label class="auth__label">
          <span>PASSWORD</span>
          <input name="password" type="password" required placeholder="••••••••" />
        </label>

        <button class="btn btn--primary btn--lg" type="submit">LOGIN</button>
      </form>

      <div class="auth__footer">
        <p>Don't have an account? <a href="signup.html">Sign up</a></p>
        <p class="auth__admin-link"><a href="admin-login.html">Admin Login</a></p>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
  <script src="auth.js"></script>
</body>
</html>
